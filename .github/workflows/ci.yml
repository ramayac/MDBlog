name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mbstring, xml, dom
        coverage: none

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress

    - name: Lint PHP files
      run: make lint

    - name: Run tests
      run: make test
