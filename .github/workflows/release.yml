name: Release — Build & Push Docker Image

on:
  release:
    types: [published]

jobs:
  build-and-push:
    name: Build and push to ghcr.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bake version.php
        run: |
          COMMIT=$(git log -1 --format="%h")
          DATE=$(git log -1 --format="%ad" --date=short)
          VERSION="${{ github.event.release.tag_name }}"
          php -r 'file_put_contents("version.php", "<?php return [\"commit\"=>\"'"$COMMIT"'\",\"date\"=>\"'"$DATE"'\",\"version\"=>\"'"$VERSION"'\"];\n");'
          echo "version.php written: commit=$COMMIT, date=$DATE, version=$VERSION"

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
