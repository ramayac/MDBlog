name: Deploy — Push to ECR & Update Lambda

on:
  workflow_run:
    workflows: ["Release — Build & Push to GHCR"]
    types: [completed]

jobs:
  deploy-aws:
    name: Push to ECR and update Lambda
    runs-on: ubuntu-latest
    # Only run when the GHCR workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: read

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ca-central-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull from GHCR, retag and push to ECR
        run: |
          docker pull ghcr.io/${{ github.repository }}:latest
          docker tag ghcr.io/${{ github.repository }}:latest \
            ${{ steps.login-ecr.outputs.registry }}/ramayac/mdblog:latest
          docker push ${{ steps.login-ecr.outputs.registry }}/ramayac/mdblog:latest

      - name: Update Lambda Function
        run: |
          aws lambda update-function-code \
            --function-name mdblog-function \
            --image-uri ${{ steps.login-ecr.outputs.registry }}/ramayac/mdblog:latest
