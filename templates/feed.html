<h2 class="category-title">Feed</h2>

<main class="main-content">
    <div class="feed-subscribe-card">
        <div class="feed-subscribe-text">
            <h3>Subscribe via RSS</h3>
            <p>Get new posts delivered to your feed reader.</p>
        </div>
        <a href="/feed.xml" class="feed-subscribe-link" title="RSS Feed">RSS Feed 📡</a>
    </div>

    {{ if not .Posts }}
    <div class="no-posts">
        <p>No posts available.</p>
    </div>
    {{ else }}
    <table class="feed-table">
        <thead>
            <tr>
                <th>Date</th>
                <th>Category</th>
                <th>Title</th>
            </tr>
        </thead>
        <tbody>
            {{ range .Posts }}
            <tr>
                <td class="feed-date">{{ formatDate .Date }}</td>
                <td class="feed-category">
                    {{ if .Category }}<a href="/?category={{ .CategorySlug | urlquery }}">{{ .Category.BlogName }}</a>{{ end }}
                </td>
                <td class="feed-title">
                    <a href="/post?slug={{ .Slug | urlquery }}{{ if .CategorySlug }}&category={{ .CategorySlug | urlquery }}{{ end }}">{{ .Title }}</a>
                </td>
            </tr>
            {{ end }}
        </tbody>
    </table>
    {{ end }}
</main>
