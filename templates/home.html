<header class="blog-title">
    <h2>
        {{ .Config.BlogName }}
        {{ if .Config.HeaderContent }}<br><small>{{ .Config.HeaderContent }}</small>{{ end }}
    </h2>
</header>

<main class="main-content">
    {{ if .IndexBlurb }}
    <div class="index-content">
        {{ .IndexBlurb }}
    </div>
    {{ end }}

    {{ if .Categories }}
    <div class="category-cards">
        {{ range .Categories }}
        <a href="?category={{ .Slug | urlquery }}" class="category-card">
            <h3>{{ .BlogName }}</h3>
            {{ if .HeaderContent }}<p>{{ .HeaderContent }}</p>{{ end }}
            <span class="post-count">{{ .Count }} posts</span>
        </a>
        {{ end }}
    </div>
    {{ end }}
</main>
