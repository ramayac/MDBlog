{{ define "post_preview" }}
<a href="{{ .PostURL }}" class="post-preview">
    <h2 class="post-title">{{ .Post.Title }}</h2>
    <div class="post-meta">
        <span class="post-date">{{ printf (.Config.Labels.PostedOn | defaultStr "on %s") (.Post.Date | formatDate) }}</span>
    </div>
    {{ if .Post.Excerpt }}
    <div class="post-excerpt">
        {{ .Post.Excerpt }}
    </div>
    {{ end }}
</a>
{{ end }}
