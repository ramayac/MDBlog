{{ define "post_preview" }}
<article class="post-preview">
    <h2 class="post-title">
        <a href="{{ .PostURL }}">{{ .Post.Title }}</a>
    </h2>
    <div class="post-meta">
        <span class="post-date">{{ printf (.Config.Labels.PostedOn | defaultStr "on %s") (.Post.Date | formatDate) }}</span>
    </div>
    {{ if .Post.Excerpt }}
    <div class="post-excerpt">
        {{ .Post.Excerpt }}
    </div>
    {{ end }}
    <a href="{{ .PostURL }}" class="read-more">{{ .Config.Labels.ReadMore | safeHTML }}</a>
</article>
{{ end }}
