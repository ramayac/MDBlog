<main class="main-content">
    <article class="post">
        <header class="page-header">
            <h2 class="page-title">{{ .Page.Title }}
                {{ if .PageDescription }}<small>{{ .PageDescription }}</small>{{ end }}
            </h2>
        </header>

        <div class="post-content">
            {{ .Page.Content | safeHTML }}
        </div>
    </article>

    <nav class="post-navigation">
        <a href="/" class="back-to-home">{{ .Config.Labels.BackToAll }}</a>
    </nav>
</main>
