<h2 class="category-title">
  {{ .Page.Title }}
  {{ if .PageDescription }}<br><small>{{ .PageDescription }}</small>{{ end }}
</h2>

<main class="main-content">
  <div class="post-content">{{ .Page.Content | safeHTML }}</div>

  <nav class="post-navigation">
    <a href="/" class="back-to-home">{{ .Config.Labels.BackToAll }}</a>
  </nav>
</main>
