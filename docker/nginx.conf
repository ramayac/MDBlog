# MDBlog nginx config — minimal, hardened, non-root (www-data)
# Master process runs as www-data (inherited from Dockerfile USER)
worker_processes auto;
pid /tmp/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 512;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Hide nginx version in headers and error pages
    server_tokens off;

    # Write all temp files to /tmp (tmpfs — required for read-only rootfs)
    client_body_temp_path /tmp/nginx_client_body;
    fastcgi_temp_path     /tmp/nginx_fastcgi;
    proxy_temp_path       /tmp/nginx_proxy;
    uwsgi_temp_path       /tmp/nginx_uwsgi;
    scgi_temp_path        /tmp/nginx_scgi;

    # Log to stdout/stderr so Docker captures them
    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 30;

    # Compress text responses
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/json application/xml+rss;

    server {
        listen 8080;
        server_name _;

        root  /var/www/html;
        index index.php;

        # ── Security headers ────────────────────────────────────────────────
        add_header X-Frame-Options          "SAMEORIGIN"                      always;
        add_header X-Content-Type-Options   "nosniff"                         always;
        add_header X-XSS-Protection         "1; mode=block"                   always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy       "interest-cohort=()"              always;

        # ── Block dotfiles (.git, .env, .htaccess, etc.) ────────────────────
        location ~ /\. {
            deny all;
            return 404;
        }

        # ── Block internal directories (never served directly) ───────────────
        location ~* ^/(posts|includes|cache|docker)/ {
            deny all;
            return 404;
        }

        # ── Block sensitive root-level files ────────────────────────────────
        location ~* ^/(config|version|Makefile|composer\.(json|lock)|AGENTS|README|docker-compose) {
            deny all;
            return 404;
        }

        # ── Static assets: long cache, no PHP execution ──────────────────────
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, max-age=2592000, immutable";
            access_log off;
        }

        # ── PHP entry points: ONLY index.php and post.php reach FPM ─────────
        location ~ ^/(index|post)\.php$ {
            try_files $uri =404;
            fastcgi_pass  127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include       fastcgi_params;
            fastcgi_hide_header X-Powered-By;
            fastcgi_read_timeout 30s;
        }

        # ── Deny all other .php files ────────────────────────────────────────
        location ~* \.php$ {
            deny all;
            return 404;
        }

        # ── Default: serve static files or 404 ──────────────────────────────
        location / {
            try_files $uri $uri/ =404;
        }
    }
}
