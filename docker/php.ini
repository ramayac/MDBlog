; ================================================================
; MDBlog PHP security hardening
; Loaded as conf.d/99-hardening.ini (overrides all prior values)
; ================================================================

; Hide PHP identity from HTTP headers and error pages
expose_php = Off

; Disable dangerous functions — MDBlog never needs these
disable_functions = exec,passthru,shell_exec,system,proc_open,popen,
                    curl_exec,curl_multi_exec,parse_ini_file,show_source,phpinfo,
                    pcntl_exec,pcntl_fork,pcntl_signal,pcntl_waitpid

; Block remote file inclusion
allow_url_fopen   = Off
allow_url_include = Off

; ── Resource limits ─────────────────────────────────────────────────
memory_limit        = 64M
max_execution_time  = 30
max_input_time      = 30
post_max_size = 1M
file_uploads  = Off

; ── Error handling: never expose internals to the browser ───────────
display_errors         = Off
display_startup_errors = Off
log_errors             = On
error_log              = /dev/stderr
error_reporting        = 0

; ── Session hardening (sessions are not used, but lock it down) ─────
session.cookie_httponly = 1
session.cookie_secure   = 1
session.cookie_samesite = Strict
session.use_strict_mode = 1
session.use_only_cookies = 1
session.cookie_lifetime  = 0
